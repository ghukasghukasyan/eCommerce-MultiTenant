    <script>
        // Detect PWA standalone mode (used by Blazor components via JS interop)
        window.isPwaMode = function () {
            return window.navigator.standalone === true ||
                   window.matchMedia('(display-mode: standalone)').matches;
        };
        if (window.isPwaMode()) {
            document.body.classList.add('pwa-mode');
        }

        fetch('/tenant.json')
            .then(function(r) { return r.json(); })
            .then(function(t) {
                var name = t.StoreName || '';
                if (name) {
                    document.title = name;
                    var appleTitleMeta = document.querySelector('meta[name="apple-mobile-web-app-title"]');
                    if (!appleTitleMeta) {
                        appleTitleMeta = document.createElement('meta');
                        appleTitleMeta.name = 'apple-mobile-web-app-title';
                        document.head.appendChild(appleTitleMeta);
                    }
                    appleTitleMeta.content = name;
                    var el = document.querySelector('.app-loading-brand');
                    if (el) {
                        if (t.LogoUrl) {
                            var img = document.createElement('img');
                            img.src = t.LogoUrl;
                            img.alt = name;
                            img.className = 'app-loading-logo';
                            el.appendChild(img);
                        } else {
                            el.textContent = name;
                        }
                    }
                    // Update PWA manifest name dynamically from tenant config
                    var manifestLink = document.querySelector('link[rel="manifest"]');
                    if (manifestLink) {
                        fetch('/manifest.json')
                            .then(function(r) { return r.json(); })
                            .then(function(m) {
                                m.name = name;
                                m.short_name = name;
                                var blob = new Blob([JSON.stringify(m)], { type: 'application/json' });
                                manifestLink.setAttribute('href', URL.createObjectURL(blob));
                            })
                            .catch(function() {});
                    }
                }
                var gaId = t.GoogleAnalyticsId || '';
                if (gaId) {
                    var s = document.createElement('script');
                    s.async = true;
                    s.src = 'https://www.googletagmanager.com/gtag/js?id=' + gaId;
                    document.head.appendChild(s);
                    window.dataLayer = window.dataLayer || [];
                    window.gtag = function(){dataLayer.push(arguments);}
                    gtag('js', new Date());
                    gtag('config', gaId);
                }
            })
            .catch(function() {});
    </script>
    <script src="js/pwa-install.js"></script>
    <script src="js/cookie.js"></script>
    <script src="_content/Blazored.Typeahead/blazored-typeahead.js"></script>

                    <path d="M32 18v18" stroke="#111" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="32" cy="43" r="2" fill="#c4826a"/>
                </svg>
            </div>
            <p class="blazor-err-label">Something went wrong</p>
            <h1 class="blazor-err-title">We'll be right back</h1>
            <p class="blazor-err-sub">We're experiencing a temporary issue. Please try reloading the page.</p>
            <div class="blazor-err-actions">
                <a href="." class="blazor-err-btn-primary">Reload page</a>
                <span class="blazor-err-dismiss dismiss">Dismiss</span>
            </div>
        </div>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.setBodyScroll = function (enabled) {
            document.body.style.overflow = enabled ? '' : 'hidden';
        };

        window.scrollTabIntoView = function (scrollContainerId, activeTabId) {
            var container = document.getElementById(scrollContainerId);
            var tab = document.getElementById(activeTabId);
            if (!container || !tab) return;
            var tabLeft = tab.offsetLeft;
            var tabWidth = tab.offsetWidth;
            var containerWidth = container.offsetWidth;
            var target = tabLeft - (containerWidth / 2) + (tabWidth / 2);
            container.scrollTo({ left: target, behavior: 'smooth' });
        };
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
